<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Operix Companion — Settings</title>
    <style>
      :root {
        --bg: #ffffff; --surface: #f8fafc; --line: #e2e8f0;
        --text: #0f172a; --muted: #64748b; --brand: #059669;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220; --surface: #111a2e; --line: #1e293b;
          --text: #e2e8f0; --muted: #94a3b8; --brand: #10b981;
        }
      }
      * { box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px;
      }
      .wrap { max-width: 560px; margin: 0 auto; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      .muted { color: var(--muted); font-size: 13px; }
      .card { border: 1px solid var(--line); background: var(--surface); border-radius: 14px; padding: 8px 16px; margin-top: 20px; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--line); }
      .row:last-child { border-bottom: 0; }
      .row .label { font-weight: 500; }
      .row .desc { color: var(--muted); font-size: 12px; margin-top: 2px; }
      select, input[type="text"], input[type="number"] {
        font: inherit; border-radius: 8px; border: 1px solid var(--line);
        background: var(--bg); color: var(--text); padding: 7px 10px; min-width: 160px;
      }
      .saved { color: var(--brand); font-size: 13px; height: 18px; margin-top: 12px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Operix Companion</h1>
      <div class="muted">Settings sync across your browsers.</div>
      <div class="card" id="form"></div>
      <div class="saved" id="saved"></div>
    </div>
    <script type="module" src="options.js"></script>
  </body>
</html>
